name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parent-activation:
    name: Parent activation safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run parent activation tests
        env:
          PYTHONPATH: tools/warehouse
        run: python -m unittest discover -s tools/warehouse/tests/parent_activation -p 'test_*.py' -v

  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - '7.4'
          - '8.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax
        run: composer lint:php

      - name: WordPress coding standards
        run: composer phpcs

      - name: Attribution envelope contracts
        run: composer test:php

      - name: JavaScript syntax
        run: node --check assets/js/cefa-conversion-tracking.js

      - name: Parent attribution browser contracts
        run: node tests/js/parent-attribution-test.js
